        body, html { width: 100%; height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; background: #f0f2f5; }

        #map { flex-grow: 1; width: 100%; }
        input, select, button { padding: 6px 10px; margin: 4px 2px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

<div id="controls">

        <button onclick="changeRadiusFor('filtered')">Для отфильтрованных</button>

        <button class="secondary" onclick="clearSelection()">Сбросить выделение</button>
    </div>

    <div class="panel">

        </div>
    </div>
</div>

    ymaps.ready(init);

    function init() {
        myMap = new ymaps.Map("map", {
            center: [53.9, 27.56], 
            zoom: 7,
            controls: ['zoomControl', 'searchControl', 'typeSelector', 'fullscreenControl']
        });

        setupFilters();

        // Загрузка ПВЗ
        rawData.forEach(item => {
            geocodeAndAdd(item);
        });
    }

    function setupFilters() {
        const groups = [...new Set(rawData.map(i => i.group))].filter(Boolean).sort();
        const regions = [...new Set(rawData.map(i => i.region))].filter(Boolean).sort();
        
        const gSel = document.getElementById('filterGroup');
        const rSel = document.getElementById('filterRegion');

        groups.forEach(g => gSel.innerHTML += `<option value="${g}">${g}</option>`);
        regions.forEach(r => rSel.innerHTML += `<option value="${r}">${r}</option>`);
    }

    function geocodeAndAdd(data) {
        ymaps.geocode(data.addr).then(res => {
            const obj = res.geoObjects.get(0);
            if (obj) {
                const coords = obj.geometry.getCoordinates();
                createPoint(coords, data);
            }
        });
    }

    function createPoint(coords, data) {
        // Метка
        const placemark = new ymaps.Placemark(coords, {
            balloonContent: `<b>${data.name}</b><br>${data.addr}<br>Группа: ${data.group}`,
            hintContent: "Кликните, чтобы выбрать точку"
        }, { 
            preset: 'islands#violetDotIcon' 
        });

        // Радиус
        const circle = new ymaps.Circle([coords, 3000], {}, {
            fillColor: "#9370DB33", strokeColor: "#9370DB", strokeOpacity: 0.6, strokeWidth: 2
        });

        // Свойства объекта
        const entry = {
            placemark: placemark,
            circle: circle,
            data: data,
            selected: false,
            visible: true
        };

        // Обработка клика для выделения
        placemark.events.add('click', function (e) {
            entry.selected = !entry.selected;
            updatePointStyle(entry);
            updateSelectionCount();
        });

        allPoints.push(entry);
        myMap.geoObjects.add(placemark);
        myMap.geoObjects.add(circle);
        
        updateVisibleCount();
    }

    function updatePointStyle(entry) {
        if (entry.selected) {
            entry.placemark.options.set('preset', 'islands#redDotIcon');
            entry.circle.options.set('fillColor', '#ff000033');
            entry.circle.options.set('strokeColor', '#ff0000');
        } else {
            entry.placemark.options.set('preset', 'islands#violetDotIcon');
            entry.circle.options.set('fillColor', '#9370DB33');
            entry.circle.options.set('strokeColor', '#9370DB');
        }
    }

    function applyFilters() {
        const g = document.getElementById('filterGroup').value;
        const r = document.getElementById('filterRegion').value;
        let visibleCount = 0;

        allPoints.forEach(entry => {
            const gShow = (g === 'all' || entry.data.group === g);
            const rShow = (r === 'all' || entry.data.region === r);
            const isVisible = gShow && rShow;
            
            entry.visible = isVisible;
            entry.placemark.options.set('visible', isVisible);
            entry.circle.options.set('visible', isVisible);
            
            if (isVisible) visibleCount++;
        });
        
        document.getElementById('visibleCount').innerText = `Точек на карте: ${visibleCount}`;
    }

    function changeRadiusFor(mode) {
        const newR = Number(document.getElementById('newRadiusValue').value);
        if (isNaN(newR) || newR < 0) return alert("Введите корректный радиус");

        let targetPoints = [];
        if (mode === 'filtered') {
            targetPoints = allPoints.filter(p => p.visible);
        } else if (mode === 'selected') {
            targetPoints = allPoints.filter(p => p.selected);
        }

        if (targetPoints.length === 0) return alert("Нет подходящих точек");

        targetPoints.forEach(p => {
            p.circle.geometry.setRadius(newR);
        });
    }

    function clearSelection() {
        allPoints.forEach(p => {
            p.selected = false;
            updatePointStyle(p);
        });
        updateSelectionCount();
    }

    function updateSelectionCount() {
        const count = allPoints.filter(p => p.selected).length;
        document.getElementById('selectedCount').innerText = `(${count})`;
    }

    function updateVisibleCount() {
        const count = allPoints.filter(p => p.visible).length;
        document.getElementById('visibleCount').innerText = `Точек на карте: ${count}`;
    }
</script>
